account_name: "prod"
hostname: "deployex.example.com"
port: 5001
release_adapter: "s3"
release_bucket: "myapp-prod-distribution"
secrets_adapter: "aws"
secrets_path: "deployex-myapp-prod-secrets"
aws_region: "sa-east-1"
version: "0.4.0"
otp_version: 26
os_target: "ubuntu-20.04"
notifications:
  - adapter: "webhook"
    url: "https://hooks.example.com/deployex"
    enabled: true
    events:
      - "all"
