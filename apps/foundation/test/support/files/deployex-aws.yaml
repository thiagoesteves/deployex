account_name: "prod"
hostname: "deployex.example.com"
port: 5001
release_adapter: "s3"
release_bucket: "myapp-prod-distribution"
secrets_adapter: "aws"
secrets_path: "deployex-myapp-prod-secrets"
aws_region: "sa-east-1"
version: "0.4.0"
otp_version: 26
os_target: "ubuntu-20.04"
metrics_retention_time_ms: 3600000
logs_retention_time_ms: 3600000
applications:
  - name: "myphoenixapp"
    language: "elixir"
    replicas: 3
    deploy_rollback_timeout_ms: 600000
    deploy_schedule_interval_ms: 5000
    replica_ports:
      - key: PORT
        base: 4000
    env:
      - key: STRING_VALUE
        value: "string"
      - key: BOOLEAN_TRUE
        value: true
      - key: BOOLEAN_FALSE
        value: false
      - key: NUMBER_VALUE
        value: 123
    certificates:
      - type: "domains"
        domains: ["example.com", "*.example.com"]
        certificate_check_interval_ms: 86400000
        dns_propagation_timeout_ms: 120000
        dns_check_interval_ms: 5000
        renew_before_days: 30
        dns_provider: "route53"
        dns_options:
          ttl: 1
          zone: "Z8787878787878712234"
        acme_provider: "lets_encrypt"
        acme_options:
          contact_email: "myapp@mydomain.com"
          url: "https://acme-v02.api.letsencrypt.org/directory"
          key_size: 2048
          propagation_timeout_ms: 120000
          check_interval_ms: 2000
        importer: "route53"
        importer_options:
          certificate_arn: "add::certificate::arn"
  - name: "myumbrella"
    language: "erlang"
    replicas: 2
    deploy_rollback_timeout_ms: 600000
    deploy_schedule_interval_ms: 5000
    replica_ports:
      - key: PORT
        base: 4050
    env:
      - key: MYUMBRELLA_PHX_SERVER
        value: true
      - key: MYUMBRELLA_PHX_SERVER2
        value: true