account_name: "prod"
hostname: "deployex.example.com"
port: 5001
release_adapter: "s3"
release_bucket: "myapp-prod-distribution"
secrets_adapter: "aws"
secrets_path: "deployex-myapp-prod-secrets"
aws_region: "sa-east-1"
version: "0.9.3"
otp_version: 28
otp_tls_certificates: "/usr/local/share/ca-certificates"
os_target: "ubuntu-24.04"
metrics_retention_time_ms: 3600000
logs_retention_time_ms: 3600000
notifications:
  - adapter: "webhook"                                   # options: webhook, slack, pagerduty
    url: "https://example.com/hooks/deployex"
    enabled: true
    events:
      - "all"
  - adapter: "slack"
    url: "https://hooks.slack.com/services/T.../B.../..."
    enabled: true
    events:
      - "crash_restart"
      - "deployment_complete"
      - "watchdog_threshold_exceeded"
    options:
      username: "DeployEx"
      icon_emoji: ":rocket:"
  - adapter: "pagerduty"
    enabled: true
    events:
      - "crash_restart"
      - "deployment_shutdown"
      - "watchdog_threshold_exceeded"
      - "certificate_failed"
    options:
      routing_key: "YOUR_PAGERDUTY_INTEGRATION_KEY"
monitoring:
  - type: "memory"
    enable_restart: true
    warning_threshold_percent: 75
    restart_threshold_percent: 85
applications:
  - name: "myapp"
    language: "elixir"
    replicas: 3
    deploy_rollback_timeout_ms: 600000
    deploy_schedule_interval_ms: 5000
    replica_ports:
      - key: PORT
        base: 4000
    env:
      - key: MYAPP_PHX_HOST
        value: "example.com"
      - key: MYAPP_PHX_SERVER
        value: true
      - key: MYAPP_OTP_TLS_CERT_PATH
        value: "/usr/local/share/ca-certificates"
    monitoring:
      - type: "atom"
        enable_restart: true
        warning_threshold_percent: 75
        restart_threshold_percent: 90
      - type: "process"
        enable_restart: true
        warning_threshold_percent: 75
        restart_threshold_percent: 90
      - type: "port"
        enable_restart: true
        warning_threshold_percent: 75
        restart_threshold_percent: 90
    certificates:
      - type: "domains"
        domains: ["*.example.com", "hub.example.com"]
        certificate_check_interval_ms: 86_400_000
        dns_propagation_timeout_ms: 120_000
        dns_check_interval_ms: 5000
        renew_before_days: 30
        dns_provider: "cloudflare" # or "route53"
        dns_options:
          ttl: 1
          zone: "zone"
          api_token: "ABC123GHB"
        acme_provider: "lets_encrypt"
        acme_options:
          contact_email: "myapp@mydomain.com"
          url: "https://acme-v02.api.letsencrypt.org/directory"
          key_size: 2048
        importer: "route53"
        importer_options:
          certificate_arn: "add::certificate::arn" 